<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --jade: #3ef0b0;
      --mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
      --sans: "Avenir Next", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--sans);
      color: #e9eef4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(110% 80% at 80% -10%, rgba(62, 240, 176, 0.12), transparent 55%),
        radial-gradient(90% 70% at -10% 0%, rgba(44, 120, 200, 0.08), transparent 50%),
        linear-gradient(180deg, #0d1019, #080a10);
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
      background-size: 26px 26px;
      pointer-events: none;
    }
    .card {
      position: relative;
      text-align: center;
      padding: 48px 44px;
      max-width: 440px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(20, 25, 33, 0.7), rgba(8, 11, 17, 0.7));
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--jade) 40%, #4ecca3 60%, transparent);
    }
    .mic {
      width: 56px; height: 56px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: var(--jade);
      border: 1px solid rgba(62, 240, 176, 0.3);
      background: rgba(62, 240, 176, 0.07);
      box-shadow: 0 0 24px rgba(62, 240, 176, 0.15);
    }
    .eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.24em;
      color: var(--jade);
      text-transform: uppercase;
      display: block;
      margin-bottom: 10px;
    }
    h2 { color: #fff; margin: 0 0 12px; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    p { color: #6f7d8c; margin: 0 0 26px; line-height: 1.5; font-size: 14px; }
    .status {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.03em;
      color: #7c8a9a;
      padding: 11px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.02);
    }
    .status.granted {
      color: var(--jade);
      border-color: rgba(62, 240, 176, 0.35);
      background: rgba(62, 240, 176, 0.06);
    }
    .status.denied {
      color: #ff5d6c;
      border-color: rgba(255, 93, 108, 0.35);
      background: rgba(255, 93, 108, 0.06);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="mic" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 11a7 7 0 0 0 14 0"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </div>
    <span class="eyebrow">Live Translate</span>
    <h2>Microphone Access</h2>
    <p>Allow microphone access when your browser prompts you. This tab closes automatically once granted.</p>
    <div class="status" id="status">Requesting…</div>
  </div>
  <script src="permissions.js"></script>
</body>
</html>
